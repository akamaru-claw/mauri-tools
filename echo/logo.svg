  </g>
  <!-- Echo sound waves -->
  <g transform="translate(64,16)" fill="none" stroke="url(#echoGradient)" stroke-width="5" stroke-linecap="round">
    <path d="M0 16 C10 4, 22 4, 32 16 S54 28, 64 16"/>
    <path d="M72 8 C80 2, 90 2, 98 8 S108 22, 116 16"/>
  </g>
  <!-- Wordmark -->
  <text x="70" y="54" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="#0f630e">Mauri Echo</text>
</svg>