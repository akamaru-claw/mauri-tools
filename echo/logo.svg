<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" role="img" aria-label="Mauri Echo">
  <defs>
    <linearGradient id="echoGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f630e"/>
      <stop offset="100%" stop-color="#1a9d18"/>
    </linearGradient>
  </defs>
  <!-- School mark: stylized open book / leaf -->
  <g transform="translate(6,6)" fill="#0f630e">
    <path d="M0 12 C6 4, 18 0, 26 6 L26 42 C18 36, 6 40, 0 48 Z"/>
    <path d="M28 6 C36 0, 48 4, 54 12 L54 48 C48 40, 36 36, 28 42 Z"/>
