<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Mauri Echo">
  <defs>
    <linearGradient id="echoGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f630e"/>
      <stop offset="100%" stop-color="#1a9d18"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="28" fill="#f4fbf4"/>
  <g transform="translate(60, 60)">
    <!-- Central echo/dot -->
    <circle cx="0" cy="-10" r="9" fill="url(#echoGrad)"/>
    <!-- Sound waves -->
    <path d="M-18 -10 C-32 -26, -6 -38, 0 -24" fill="none" stroke="url(#echoGrad)" stroke-width="7" stroke-linecap="round"/>
    <path d="M18 -10 C32 -26, 6 -38, 0 -24" fill="none" stroke="url(#echoGrad)" stroke-width="7" stroke-linecap="round"/>
    <path d="M-28 4 C-48 -16, -10 -54, 0 -34" fill="none" stroke="url(#echoGrad)" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    <path d="M28 4 C48 -16, 10 -54, 0 -34" fill="none" stroke="url(#echoGrad)" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    <path d="M-36 18 C-60 -6, -14 -68, 0 -44" fill="none" stroke="url(#echoGrad)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <path d="M36 18 C60 -6, 14 -68, 0 -44" fill="none" stroke="url(#echoGrad)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <!-- Book / foundation leaf shape -->
    <path d="M-30 28 C-30 18, -18 12, 0 18 C18 12, 30 18, 30 28 C30 42, 18 48, 0 44 C-18 48, -30 42, -30 28 Z" fill="#0f630e"/>
    <path d="M0 20 L0 42" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
